name: Release foundation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag in vMAJOR.MINOR.PATCH form'
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve and validate version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -eu

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
          else
            version="$REF_NAME"
          fi

          case "$version" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "version must match vMAJOR.MINOR.PATCH" >&2
              exit 1
              ;;
          esac

          normalized="${version#v}"
          if ! printf '%s\n' "$normalized" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          {
            echo "version=$normalized"
            echo "tag=$version"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Build release artifact
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -eu
          mkdir -p dist
          go build \
            -ldflags "-X github.com/l4l4dev/fj/internal/version.Value=${VERSION}" \
            -o "dist/fj-${VERSION}-${GOOS}-${GOARCH}" \
            ./cmd/fj

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fj-${{ needs.resolve-version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/fj-${{ needs.resolve-version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}

  checksums:
    needs:
      - resolve-version
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fj-${{ needs.resolve-version.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Generate and verify checksums
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -eu

          darwin_binary="fj-${VERSION}-darwin-arm64"
          linux_binary="fj-${VERSION}-linux-amd64"
          checksum_file="fj-${VERSION}-checksums.txt"

          test -f "dist/${darwin_binary}"
          test -f "dist/${linux_binary}"
          test "$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')" -eq 2

          (
            cd dist
            LC_ALL=C sha256sum \
              "${darwin_binary}" \
              "${linux_binary}" |
              LC_ALL=C sort -k2
          ) > "dist/${checksum_file}"

          test "$(wc -l < "dist/${checksum_file}" | tr -d ' ')" -eq 2
          awk -v darwin="${darwin_binary}" -v linux="${linux_binary}" '
            NF != 2 || length($1) != 64 || $1 !~ /^[0-9a-f]+$/ { exit 1 }
            NR == 1 && $2 != darwin { exit 1 }
            NR == 2 && $2 != linux { exit 1 }
          ' "dist/${checksum_file}"

          (
            cd dist
            sha256sum --check "${checksum_file}"
          )

      - name: Upload consolidated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fj-${{ needs.resolve-version.outputs.version }}-artifacts
          path: |
            dist/fj-${{ needs.resolve-version.outputs.version }}-darwin-arm64
            dist/fj-${{ needs.resolve-version.outputs.version }}-linux-amd64
            dist/fj-${{ needs.resolve-version.outputs.version }}-checksums.txt
          if-no-files-found: error
