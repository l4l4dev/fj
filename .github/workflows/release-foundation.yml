name: Release foundation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag in vMAJOR.MINOR.PATCH form'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve and validate version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -eu

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
          else
            version="$REF_NAME"
          fi

          case "$version" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "version must match vMAJOR.MINOR.PATCH" >&2
              exit 1
              ;;
          esac

          normalized="${version#v}"
          if ! printf '%s\n' "$normalized" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          {
            echo "version=$normalized"
            echo "tag=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Build release foundation artifact
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -eu
          mkdir -p dist
          go build \
            -ldflags "-X github.com/l4l4dev/fj/internal/version.Value=${VERSION}" \
            -o "dist/fj-${VERSION}-linux-amd64" \
            ./cmd/fj

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fj-${{ steps.version.outputs.version }}-linux-amd64
          path: dist/fj-${{ steps.version.outputs.version }}-linux-amd64
